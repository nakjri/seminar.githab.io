<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Семинар</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #fff8dc; /* светло‑жёлтый фон */
            color: #4a0000; /* тёмно‑красный текст */
        }
        .header {
            background-color: #8b0000; /* тёмно‑красный */
            color: #ffffe0; /* светло‑жёлтый текст */
            padding: 20px;
            text-align: center;
        }
        .content {
            text-align: center;
            padding: 40px 20px;
        }
        .greeting {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .instruction {
            font-size: 18px;
            margin-bottom: 30px;
        }
        .btn {
            display: inline-block;
            padding: 15px 30px;
            background-color: #8b0000; /* тёмно‑красный */
            color: #ffffe0; /* светло‑жёлтый текст на кнопке */
            text-decoration: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        .btn:hover {
            background-color: #a52a2a; /* чуть светлее при наведении */
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Добро пожаловать на семинар!</h1>
    </div>
    <div class="content">
        <p class="greeting">рады вас видеть :)</p>
        <p class="instruction">Чтобы продолжить, нажми кнопку</p>
        <a href="task.html" class="btn">Перейти к заданию</a>
    </div>
</body>
</html>
